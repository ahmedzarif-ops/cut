kind = "mobile"
previewPath = "/"
title = "CUT OS"
version = "1.0.0"
id = "artifacts/cut-os"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22203

[services.development]
run = "pnpm --filter @workspace/cut-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cut-os", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cut-os", "run", "serve" ]

[services.env]
PORT = "22203"
BASE_PATH = "/"
