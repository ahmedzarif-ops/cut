<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="color-scheme" content="light dark" />
<meta name="supported-color-schemes" content="light dark" />
<title>{{SUBJECT}}</title>
<!-- Colors below are a NEUTRAL placeholder. Swap the hex values for your own from
     company.yml -> brand.visual_notes (brand #1E6E68, accent #B5894C used as defaults). -->
<!--[if mso]>
<style type="text/css">body,table,td,a{font-family:Arial,Helvetica,sans-serif !important;}</style>
<![endif]-->
<style type="text/css">
  body{margin:0;padding:0;width:100% !important;background:#F5F2EC;}
  table{border-collapse:collapse;}
  img{border:0;line-height:100%;outline:none;text-decoration:none;}
  a{color:#1E6E68;}
  .wrap{width:100%;background:#F5F2EC;}
  .container{width:600px;max-width:600px;}
  .px{padding-left:32px;padding-right:32px;}
  .body-text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:16px;line-height:1.6;color:#1F2733;}
  .body-text p{margin:0 0 16px;}
  .muted{color:#6F6A5C;}
  @media only screen and (max-width:620px){
    .container{width:100% !important;}
    .px{padding-left:20px !important;padding-right:20px !important;}
    .h1{font-size:24px !important;}
  }
  @media (prefers-color-scheme: dark){
    body,.wrap{background:#1F2733 !important;}
    .card{background:#283142 !important;}
    .body-text,.h1{color:#F5F2EC !important;}
    .muted{color:#C9C3B5 !important;}
    a{color:#B5894C !important;}
  }
</style>
</head>
<body>
<!-- Hidden preheader: the inbox preview line -->
<div style="display:none;max-height:0;overflow:hidden;mso-hide:all;font-size:1px;line-height:1px;color:#F5F2EC;opacity:0;">{{PREHEADER}}</div>

<center class="wrap" style="background:#F5F2EC;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F5F2EC;">
<tr><td align="center" style="padding:24px 12px;">

  <table role="presentation" class="container" width="600" cellpadding="0" cellspacing="0" style="width:600px;max-width:600px;">

    <!-- View in browser -->
    <tr><td align="right" class="px muted" style="font-family:Arial,sans-serif;font-size:12px;color:#6F6A5C;padding-bottom:10px;">
      <a href="{{VIEW_IN_BROWSER_URL}}" style="color:#6F6A5C;text-decoration:underline;">View in browser</a>
    </td></tr>

    <!-- Header band -->
    <tr><td style="background:#1E6E68;border-radius:12px 12px 0 0;padding:22px 32px;">
      <span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Georgia,serif;font-size:18px;font-weight:700;letter-spacing:0.02em;color:#F5F2EC;">{{BUSINESS_NAME}}</span>
    </td></tr>

    <!-- Card body -->
    <tr><td class="card px" style="background:#ffffff;padding:32px;">

      <h1 class="h1" style="margin:0 0 16px;font-family:Georgia,'Times New Roman',serif;font-size:28px;line-height:1.2;color:#1E6E68;font-weight:700;">{{HEADLINE}}</h1>

      <div class="body-text" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:16px;line-height:1.6;color:#1F2733;">{{BODY_HTML}}</div>

      <!-- Bulletproof CTA button -->
      <table role="presentation" cellpadding="0" cellspacing="0" style="margin:24px 0 4px;">
        <tr><td align="center" bgcolor="#1E6E68" style="border-radius:10px;">
          <!--[if mso]>
          <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{CTA_URL}}" style="height:48px;v-text-anchor:middle;width:300px;" arcsize="20%" strokecolor="#1E6E68" fillcolor="#1E6E68">
          <w:anchorlock/><center style="color:#F5F2EC;font-family:Arial,sans-serif;font-size:16px;font-weight:bold;">{{CTA_LABEL}}</center>
          </v:roundrect>
          <![endif]-->
          <!--[if !mso]><!-- -->
          <a href="{{CTA_URL}}" target="_blank" style="display:inline-block;padding:14px 30px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;font-size:16px;font-weight:700;color:#F5F2EC;text-decoration:none;border-radius:10px;background:#1E6E68;">{{CTA_LABEL}}</a>
          <!--<![endif]-->
        </td></tr>
      </table>

      <div class="body-text muted" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.6;color:#6F6A5C;">{{SECONDARY_HTML}}</div>

    </td></tr>

    <!-- Footer -->
    <tr><td class="px muted" style="background:#ffffff;border-radius:0 0 12px 12px;border-top:1px solid #E4DDCF;padding:20px 32px 28px;font-family:Arial,sans-serif;font-size:12px;line-height:1.6;color:#6F6A5C;">
      <strong style="color:#1F2733;">{{BUSINESS_NAME}}</strong><br />
      {{BUSINESS_ADDRESS}}<br /><br />
      You are receiving this because you signed up at {{BUSINESS_NAME}}.
      <a href="{{UNSUB_URL}}" style="color:#6F6A5C;text-decoration:underline;">Unsubscribe</a>.
    </td></tr>

  </table>

</td></tr>
</table>
</center>
</body>
</html>
